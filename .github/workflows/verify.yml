name: verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  active-frontends:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Linux frontend prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli

      - name: Install repo dependencies
        run: ./launcher.sh --install

      - name: Verify active frontends
        run: ./launcher.sh --test
